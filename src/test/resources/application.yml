quarkus:
  log:
    level: WARN
    category:
      "io.floci.gcp":
        level: INFO

floci-gcp:
  port: 4588
  default-project-id: test-project
  storage:
    mode: memory
  services:
    datastore:
      enabled: true
    kafka:
      enabled: true
      mock: true
    cloudsql:
      enabled: true
      data-plane-enabled: false
    cloudtasks:
      enabled: true
    cloudrun:
      enabled: true
    cloudfunctions:
      enabled: true
