name: Compatibility Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'docker/Dockerfile.jvm-package'
      - 'compatibility-tests/**'
      - '.github/workflows/compatibility.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build floci-gcp image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build JVM artifact
        run: mvn clean package -DskipTests -q

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/Dockerfile.jvm-package
          tags: floci-gcp:test
          outputs: type=docker,dest=/tmp/floci-gcp-image.tar
          cache-from: type=gha,scope=floci-gcp
          cache-to: type=gha,scope=floci-gcp,mode=max

      - name: Compress image
        run: gzip /tmp/floci-gcp-image.tar

      - name: Upload floci-gcp image
        uses: actions/upload-artifact@v7
        with:
          name: floci-gcp-image
          path: /tmp/floci-gcp-image.tar.gz
          retention-days: 1

  compat-test:
    name: ${{ matrix.test }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        test:
          - sdk-test-java
          - sdk-test-node
          - sdk-test-python
          - sdk-test-go

    steps:
      - name: Download floci-gcp image
        uses: actions/download-artifact@v8
        with:
          name: floci-gcp-image
          path: /tmp

      - name: Load floci-gcp image
        run: gunzip -c /tmp/floci-gcp-image.tar.gz | docker load

      - name: Create Docker network
        run: docker network create compat-net

      - name: Start floci-gcp
        run: |
          docker run -d --name floci-gcp --network compat-net \
            -p 4588:4588 \
            -e FLOCI_GCP_BASE_URL=http://floci-gcp:4588 \
            -e FLOCI_GCP_HOSTNAME=floci-gcp \
            floci-gcp:test

      - name: Wait for floci-gcp to be ready
        run: timeout 60 bash -c 'until curl -sf http://localhost:4588/health >/dev/null 2>&1; do sleep 1; done'

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: compatibility-tests

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build test image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: compatibility-tests/${{ matrix.test }}
          load: true
          tags: compat-${{ matrix.test }}
          cache-from: type=gha,scope=${{ matrix.test }}
          cache-to: type=gha,scope=${{ matrix.test }},mode=max

      - name: Run tests
        id: tests
        run: |
          mkdir -p test-results
          docker run --rm --network compat-net \
            -e FLOCI_GCP_ENDPOINT=http://floci-gcp:4588 \
            -v "$(pwd)/test-results:/results" \
            compat-${{ matrix.test }}

      - name: Generate test summary
        if: always() && steps.tests.outcome != 'skipped'
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # v2
        with:
          paths: test-results/*.xml

      - name: Dump floci-gcp logs
        if: failure()
        run: docker logs floci-gcp
