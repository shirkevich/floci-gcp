name: Compatibility Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'docker/Dockerfile.jvm-package'
      - 'compatibility-tests/**'
      - '.github/workflows/compatibility.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build floci-gcp image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build JVM artifact
        run: mvn clean package -DskipTests -q

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile.jvm-package
          tags: floci-gcp:test
          outputs: type=docker,dest=/tmp/floci-gcp-image.tar
          cache-from: type=gha,scope=floci-gcp
          cache-to: type=gha,scope=floci-gcp,mode=max

      - name: Compress image
        run: gzip /tmp/floci-gcp-image.tar

      - name: Upload floci-gcp image
        uses: actions/upload-artifact@v7
        with:
          name: floci-gcp-image
          path: /tmp/floci-gcp-image.tar.gz
          retention-days: 1

  compat-test:
    name: ${{ matrix.test }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        test:
          - sdk-test-java
          - sdk-test-node
          - sdk-test-python
          - sdk-test-go
          - compat-terraform
          - compat-opentofu

    steps:
      - name: Download floci-gcp image
        uses: actions/download-artifact@v8
        with:
          name: floci-gcp-image
          path: /tmp

      - name: Load floci-gcp image
        run: gunzip -c /tmp/floci-gcp-image.tar.gz | docker load

      - name: Create Docker network
        run: docker network create compat-net

      - name: Start floci-gcp
        run: |
          DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)
          KAFKA_MOCK=false
          case "${{ matrix.test }}" in
            sdk-test-*) KAFKA_MOCK=true ;;
          esac
          docker run -d --name floci-gcp --network compat-net \
            -p 4588:4588 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            --group-add "$DOCKER_GID" \
            -e FLOCI_GCP_BASE_URL=http://floci-gcp:4588 \
            -e FLOCI_GCP_HOSTNAME=floci-gcp \
            -e FLOCI_GCP_SERVICES_DOCKER_NETWORK=compat-net \
            -e FLOCI_GCP_SERVICES_KAFKA_MOCK="$KAFKA_MOCK" \
            -e FLOCI_GCP_SERVICES_CLOUDRUN_EXECUTION_ENABLED=true \
            floci-gcp:test

      - name: Wait for floci-gcp to be ready
        run: timeout 60 bash -c 'until curl -sf http://localhost:4588/health >/dev/null 2>&1; do sleep 1; done'

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: compatibility-tests

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build test image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: compatibility-tests/${{ matrix.test }}
          load: true
          tags: compat-${{ matrix.test }}
          cache-from: type=gha,scope=${{ matrix.test }}
          cache-to: type=gha,scope=${{ matrix.test }},mode=max

      - name: Run tests
        id: tests
        timeout-minutes: 30
        run: |
          mkdir -p test-results
          docker run --rm --network compat-net \
            -e FLOCI_GCP_ENDPOINT=http://floci-gcp:4588 \
            -e FLOCI_ENDPOINT=http://floci-gcp:4588 \
            -e FLOCI_HOST=floci-gcp:4588 \
            -e FLOCI_PROJECT=test-project \
            -e FLOCI_GCP_CLOUDRUN_EXECUTION_ENABLED=true \
            -v "$(pwd)/test-results:/results" \
            compat-${{ matrix.test }}

      - name: Generate test summary
        if: always() && steps.tests.outcome != 'skipped'
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2
        with:
          paths: test-results/*.xml

      - name: Dump floci-gcp logs
        if: failure() || cancelled()
        run: docker logs floci-gcp
